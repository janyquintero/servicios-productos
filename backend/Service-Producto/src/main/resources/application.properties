spring.application.name=Service-Producto

# Forzamos la URL interna de la red de Docker aquí mismo

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/service_producto_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user_admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password_secret}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.org.hibernate.envers.revision_entity_class=com.Quintero.Service_Producto.model.AuditRevisionEntity
